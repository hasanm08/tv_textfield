name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Analyze and test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

  publish:
    name: Publish to pub.dev
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Read package version
        id: version
        run: echo "version=$(awk '/^version:/{print $2}' pubspec.yaml)" >> "$GITHUB_OUTPUT"

      - name: Skip if version already published
        id: check
        run: |
          status=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://pub.dev/api/packages/tv_textfield/versions/${{ steps.version.outputs.version }}")
          if [ "$status" = "200" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Version ${{ steps.version.outputs.version }} is already on pub.dev."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "Version ${{ steps.version.outputs.version }} is not published yet."
          fi

      - name: Publish package
        if: steps.check.outputs.skip != 'true'
        env:
          PUB_CREDENTIALS: ${{ secrets.PUB_CREDENTIALS }}
        run: dart pub publish --force
