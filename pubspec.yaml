name: tv_textfield
description: >-
  A TV-friendly TextField that fixes D-pad focus issues and supports both
  software and hardware keyboards on Android TV, Apple TV, and other platforms.
version: 1.0.2
homepage: https://github.com/hasanm08/tv_textfield
repository: https://github.com/hasanm08/tv_textfield
issue_tracker: https://github.com/hasanm08/tv_textfield/issues

topics:
  - tv
  - android-tv
  - apple-tv
  - textfield
  - focus
  - d-pad
  - remote-control
  - flutter-tv

environment:
  sdk: ^3.12.2
  flutter: ">=3.44.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter
  plugin_platform_interface: ^2.1.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  plugin:
    platforms:
      android:
        package: com.tvtextfield.tv_textfield
        pluginClass: TvTextfieldPlugin
      ios:
        pluginClass: TvTextfieldPlugin
      tvos:
        pluginClass: TvTextfieldPlugin
      web:
        pluginClass: TvTextfieldPluginWeb
        fileName: tv_textfield_web.dart
      macos:
        dartPluginClass: TvTextfieldPluginStub
      linux:
        dartPluginClass: TvTextfieldPluginStub
      windows:
        dartPluginClass: TvTextfieldPluginStub
