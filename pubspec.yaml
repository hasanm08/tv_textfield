name: tv_textfield
description: >-
  A TV-friendly TextField that fixes D-pad focus issues and supports both
  software and hardware keyboards on Android TV, Apple TV, and other platforms.
version: 0.1.0
homepage: https://github.com/hasanm08/tv_textfield
repository: https://github.com/hasanm08/tv_textfield
issue_tracker: https://github.com/hasanm08/tv_textfield/issues

environment:
  sdk: ^3.12.2
  flutter: ">=3.27.0"

dependencies:
  flutter:
    sdk: flutter
  plugin_platform_interface: ^2.1.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  plugin:
    platforms:
      android:
        package: com.tvtextfield.tv_textfield
        pluginClass: TvTextfieldPlugin
      ios:
        pluginClass: TvTextfieldPlugin
        sharedDarwinSource: true
      tvos:
        pluginClass: TvTextfieldPlugin
        sharedDarwinSource: true
